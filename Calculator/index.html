<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display">
            <input type="text" id="display" placeholder="0" readonly>
        </div>
        
        <div class="buttons-container">
            <div class="row">
                <button class="btn function-btn" id="clear">AC</button>
                <button class="btn function-btn" id="delete">DEL</button>
                <button class="btn function-btn" id="percent">%</button>
                <button class="btn operator-btn" id="divide">÷</button>
            </div>
            
            <div class="row">
                <button class="btn number-btn" data-value="7">7</button>
                <button class="btn number-btn" data-value="8">8</button>
                <button class="btn number-btn" data-value="9">9</button>
                <button class="btn operator-btn" id="multiply">×</button>
            </div>
            
            <div class="row">
                <button class="btn number-btn" data-value="4">4</button>
                <button class="btn number-btn" data-value="5">5</button>
                <button class="btn number-btn" data-value="6">6</button>
                <button class="btn operator-btn" id="subtract">−</button>
            </div>
            
            <div class="row">
                <button class="btn number-btn" data-value="1">1</button>
                <button class="btn number-btn" data-value="2">2</button>
                <button class="btn number-btn" data-value="3">3</button>
                <button class="btn operator-btn" id="add">+</button>
            </div>
            
            <div class="row">
                <button class="btn number-btn zero-btn" data-value="0">0</button>
                <button class="btn number-btn" data-value=".">.</button>
                <button class="btn equals-btn" id="equals">=</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
